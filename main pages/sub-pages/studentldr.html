<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POMNSoE | Student Leadership</title>
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/swlayout.css">
  <link rel="stylesheet" href="../../css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div id="navbar"></div>
<div id="breadcrumbs"></div>
<main class="src-container page-container">

    
    <section class="src-section">
        <h1>Student Representative Council (SRC)</h1>
        <p>
            The SRC represents the voice of the student body, leaders entrusted
            with responsibility, discipline, and service to the school community.
        </p>
    </section>

    
    <section class="src-section">
        <h2>Executives</h2>
        <div class="src-grid" id="execGrid"></div>
    </section>

    
    <section class="src-section">
        <h2>Chairpersons</h2>
        <div id="chairGrid"></div>
    </section>

</main>


<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close-btn" id="closeModal">&times;</span>
        <img id="modalImg" alt="Leader Profile Picture">
        <h2 id="modalName"></h2>
        <p id="modalRole"></p>
        <p id="modalDept"></p>
        <p id="modalEmail"></p>
    </div>
</div>
<div id="footer"></div>

<script src="/js/main.js"></script>
<script src="/js/nav.js"></script>
<script src="../../js/src.js"></script>
</body>
</html>
